<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TraderOS AI Dashboard</title>

<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<div class="sidebar">

<h2>TraderOS AI</h2>

<ul>
<li>🏠 Dashboard</li>
<li>📊 Risk Calculator</li>
<li>📈 Position Size</li>
<li>📒 Trade Journal</li>
<li>📉 Analytics</li>
<li>⚙ Settings</li>
</ul>

</div>

<div class="main">

<div class="topbar">

<h2>Dashboard</h2>
<button id="addTradeBtn">+ Add Trade</button>

<!-- Add Trade Popup -->

<div id="tradeModal" class="modal">

    <div class="modal-content">

        <h2>Add New Trade</h2>

        <input type="text" id="tradeSymbol" placeholder="Stock / Symbol">

        <input type="number" id="entryPrice" placeholder="Entry Price">

        <input type="number" id="exitPrice" placeholder="Exit Price">

        <input type="number" id="quantity" placeholder="Quantity">

        <select id="tradeType">
            <option value="BUY">BUY</option>
            <option value="SELL">SELL</option>
        </select>

        <button id="saveTradeBtn">Save Trade</button>

        <button id="closeTradeBtn">Close</button>

    </div>

</div>

<div>

        <span id="welcomeUser"></span>

        <button>Logout</button>

    </div>

</div>

<div class="cards">

    <div class="card">
        <h3>Total Trades</h3>
        <h1 id="totalTrades">0</h1>
    </div>

<div class="card">
    <h3>Total Profit</h3>
    <h1 id="totalProfit">₹0</h1>
</div>

<div class="card">
    <h3>Win Rate</h3>
    <h1 id="winRate">0%</h1>
</div>
</div>

<h2>Trade Journal</h2>

<table id="tradeTable">
    <thead>
        <tr>
            <th>Symbol</th>
            <th>Entry</th>
            <th>Exit</th>
            <th>Qty</th>
            <th>Type</th>
            <th>Profit</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="tradeTableBody"></tbody>
</table>
</div> <!--main-->

<script src="dashboard.js"></script>

</body>
</html>
